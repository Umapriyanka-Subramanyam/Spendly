services:
  - type: web
    name: spendly-app
    runtime: python
    pythonVersion: "3.10"
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn app:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: spendly-db
          property: connectionString

  - type: postgres
    name: spendly-db
    version: "15"
    plan: free
