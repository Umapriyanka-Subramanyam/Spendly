{% extends 'base.html' %}

{% block title %}Expenses - Spendly{% endblock %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-6">
        <h1 class="display-6 fw-bold mb-0">Expenses</h1>
    </div>
    <div class="col-md-6 text-md-end">
        <select id="filter-period" class="form-select form-select-sm d-inline-block" style="width: auto;">
            <option value="all">All Time</option>
            <option value="30">Last 30 Days</option>
            <option value="7">Last 7 Days</option>
            <option value="month">This Month</option>
        </select>
    </div>
</div>

<div class="row g-4">
    <!-- Add Expense Form -->
    <div class="col-lg-6">
        <div class="card spendly-card p-4">
            <h5 class="mb-4">
                <i class="fas fa-plus-circle text-primary me-2"></i> Add New Expense
            </h5>
            <form id="expense-form">
                <!-- Payer Selection -->
                <div class="mb-3">
                    <label class="form-label">Who Paid?</label>
                    <select name="payer" class="form-select" required>
                        <option value="">Select payer...</option>
                        <option value="1">You</option>
                        <option value="2">Friend 1</option>
                        <option value="3">Friend 2</option>
                    </select>
                </div>

                <!-- Amount -->
                <div class="mb-3">
                    <label class="form-label">Amount</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0">₹</span>
                        <input type="number" step="0.01" min="0" name="amount" 
                               class="form-control border-start-0" placeholder="0.00" required>
                    </div>
                </div>

                <!-- Category Selection -->
                <div class="mb-3">
                    <label class="form-label d-block mb-2">Category</label>
                    <div class="btn-group-vertical w-100" role="group">
                        <input type="hidden" name="category" id="category-input" value="Food" required>
                        <button type="button" class="btn btn-category text-start p-2 category-btn active" data-category="Food">
                            <i class="fas fa-utensils me-1"></i> Food & Dining
                        </option>
                        <option value="Transport"><i class="fas fa-car me-1"></i> Transport & Travel
                        </option>
                        <option value="Shopping"><i class="fas fa-shopping-bag me-1"></i> Shopping
                        </option>
                        <option value="Bills"><i class="fas fa-file-invoice-dollar me-1"></i> Bills & Utilities
                        </option>
                        <option value="Entertainment"><i class="fas fa-film me-1"></i> Entertainment
                        </option>
                        <option value="Other"><i class="fas fa-map-pin me-1"></i> Other
                        <button type="button" class="btn btn-category text-start p-2 category-btn" data-category="Entertainment">
                            🎬 Entertainment
                        </button>
                        <button type="button" class="btn btn-category text-start p-2 category-btn" data-category="Health">
                            🏥 Health & Fitness
                        </button>
                        <button type="button" class="btn btn-category text-start p-2 category-btn" data-category="Other">
                            📌 Other
                        </button>
                    </div>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label class="form-label">Description (Optional)</label>
                    <input type="text" name="description" class="form-control" placeholder="e.g., Dinner at restaurant">
                </div>

                <!-- Notes -->
                <div class="mb-4">
                    <label class="form-label">Notes (Optional)</label>
                    <textarea name="notes" class="form-control" rows="2" placeholder="Add any additional notes..."></textarea>
                </div>

                <!-- Submit -->
                <button class="btn btn-primary w-100" type="submit">
                    <i class="fas fa-plus me-2"></i> Add Expense
                </button>
            </form>
        </div>
    </div>

    <!-- Recent Expenses List -->
    <div class="col-lg-6">
        <div class="card spendly-card p-4">
            <h5 class="mb-4">
                <i class="fas fa-list text-primary me-2"></i> Recent Expenses
            </h5>
            <div id="expenses-list">
                <div class="text-center py-5 text-muted">
                    <i class="fas fa-inbox fa-3x mb-3 opacity-50"></i>
                    <p class="small">No expenses yet. Add one to get started!</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Category button selection
document.querySelectorAll('.category-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('category-input').value = this.getAttribute('data-category');
    });
});

// Form submission
document.getElementById('expense-form').addEventListener('submit', function(e) {
    e.preventDefault();
    showToast('Expense added successfully!', 'success');
    this.reset();
    document.querySelector('.category-btn').classList.add('active');
});

// Load expenses
function loadExpenses() {
    const list = document.getElementById('expenses-list');
    // Placeholder implementation - will be connected to API
    console.log('Loading expenses...');
}

loadExpenses();
</script>
{% endblock %}
