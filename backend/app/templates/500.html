{% extends 'base.html' %}

{% block title %}Server Error - Spendly{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="text-center">
        <div style="font-size: 5rem; margin-bottom: 1rem; color: var(--spendly-danger);">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 class="display-4 fw-bold mb-3">500</h1>
        <p class="lead text-muted mb-4">Server Error</p>
        <p class="text-muted mb-4">Something went wrong on our end. Our team has been notified.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg">
            <i class="fas fa-home me-2"></i> Go Home
        </a>
    </div>
</div>
{% endblock %}
