{% extends 'base.html' %}

{% block title %}Change Password - Spendly{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1 class="display-6 fw-bold mb-0">Settings</h1>
    </div>
</div>

<div class="row g-4">
    <!-- Settings Sidebar -->
    <div class="col-md-3">
        <div class="list-group list-group-flush rounded bg-dark border border-secondary shadow-sm">
            <a href="{{ url_for('settings.profile') }}"
                class="list-group-item list-group-item-action bg-transparent text-light border-secondary">
                <i class="fas fa-user fa-fw me-2"></i> Profile
            </a>
            <a href="{{ url_for('settings.preferences') }}"
                class="list-group-item list-group-item-action bg-transparent text-light border-secondary">
                <i class="fas fa-sliders-h fa-fw me-2"></i> Preferences
            </a>
            <a href="{{ url_for('settings.change_password') }}"
                class="list-group-item list-group-item-action active bg-primary text-white border-primary">
                <i class="fas fa-lock fa-fw me-2"></i> Password
            </a>
            <a href="{{ url_for('settings.delete_account') }}"
                class="list-group-item list-group-item-action bg-transparent text-light border-secondary">
                <i class="fas fa-trash fa-fw me-2"></i> Account
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="col-md-9">
        <div class="card spendly-card p-4 border-warning">
            <h5 class="mb-4"><i class="fas fa-lock text-warning me-2"></i> Change Password</h5>
            <form action="{{ url_for('settings.change_password') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Current Password</label>
                    <input type="password" class="form-control bg-dark border-secondary text-light" name="old_password"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-control bg-dark border-secondary text-light" name="new_password"
                        required minlength="6">
                    <div class="form-text text-muted">Must be at least 6 characters long.</div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control bg-dark border-secondary text-light"
                        name="confirm_password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-warning text-dark fw-bold">Update Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
