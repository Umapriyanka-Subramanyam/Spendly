{% extends 'base.html' %}

{% block title %}Preferences - Spendly{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1 class="display-6 fw-bold mb-0">Settings</h1>
    </div>
</div>

<div class="row g-4">
    <!-- Settings Sidebar -->
    <div class="col-md-3">
        <div class="list-group list-group-flush rounded bg-dark border border-secondary shadow-sm">
            <a href="{{ url_for('settings.profile') }}"
                class="list-group-item list-group-item-action bg-transparent text-light border-secondary">
                <i class="fas fa-user fa-fw me-2"></i> Profile
            </a>
            <a href="{{ url_for('settings.preferences') }}"
                class="list-group-item list-group-item-action active bg-primary text-white border-primary">
                <i class="fas fa-sliders-h fa-fw me-2"></i> Preferences
            </a>
            <a href="{{ url_for('settings.change_password') }}"
                class="list-group-item list-group-item-action bg-transparent text-light border-secondary">
                <i class="fas fa-lock fa-fw me-2"></i> Password
            </a>
            <a href="{{ url_for('settings.delete_account') }}"
                class="list-group-item list-group-item-action bg-transparent text-light border-secondary">
                <i class="fas fa-trash fa-fw me-2"></i> Account
            </a>
            <a href="{{ url_for('settings.export_data') }}"
                class="list-group-item list-group-item-action bg-transparent text-light border-secondary mt-3">
                <i class="fas fa-download fa-fw me-2"></i> Export Data
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="col-md-9">
        <div class="card spendly-card p-4">
            <h5 class="mb-4"><i class="fas fa-sliders-h text-primary me-2"></i> Global Preferences</h5>
            <form action="{{ url_for('settings.preferences_update') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Default Currency</label>
                    <select class="form-select bg-dark text-light border-secondary" name="currency">
                        <option value="INR" selected class="bg-dark text-light">₹ Indian Rupee (INR)</option>
                        <option value="USD" class="bg-dark text-light">$ US Dollar (USD)</option>
                        <option value="EUR" class="bg-dark text-light">€ Euro (EUR)</option>
                        <option value="GBP" class="bg-dark text-light">£ British Pound (GBP)</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label">Date Format</label>
                    <select class="form-select bg-dark text-light border-secondary" name="date_format">
                        <option value="%d/%m/%Y" selected class="bg-dark text-light">DD/MM/YYYY (23/02/2026)</option>
                        <option value="%m/%d/%Y" class="bg-dark text-light">MM/DD/YYYY (02/23/2026)</option>
                        <option value="%Y-%m-%d" class="bg-dark text-light">YYYY-MM-DD (2026-02-23)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save Preferences</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
