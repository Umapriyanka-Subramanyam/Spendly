<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img" aria-label="Spendly logo icon">
  <defs>
    <!-- Main brand gradient: indigo → violet → purple -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Accent spark gradient: cyan/teal -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- Subtle shimmer overlay -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Outer glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4f46e5" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="72" height="72" rx="18" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <rect x="4" y="4" width="72" height="36" rx="18" fill="url(#shineGrad)"/>
  <rect x="4" y="4" width="72" height="4" rx="2" fill="#ffffff" opacity="0.07"/>

  <!-- Chart bars (analytics / expense tracking motif) -->
  <g transform="translate(14, 48)" filter="url(#glow)">
    <!-- Bar 1 (short) -->
    <rect x="0"  y="10" width="8" height="10" rx="2.5" fill="#ffffff" opacity="0.70"/>
    <!-- Bar 2 (tall) -->
    <rect x="12" y="0"  width="8" height="20" rx="2.5" fill="#ffffff" opacity="0.95"/>
    <!-- Bar 3 (medium) -->
    <rect x="24" y="5"  width="8" height="15" rx="2.5" fill="#ffffff" opacity="0.85"/>
    <!-- Bar 4 (tallest) -->
    <rect x="36" y="-4" width="8" height="24" rx="2.5" fill="#ffffff"/>
  </g>

  <!-- Trend line / upward arrow overlay -->
  <polyline
    points="14,44  27,32  41,37  57,20"
    fill="none"
    stroke="url(#accentGrad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
    filter="url(#glow)"
  />

  <!-- Trend dot at tip -->
  <circle cx="57" cy="20" r="4.5" fill="url(#accentGrad)" filter="url(#glow)"/>

  <!-- Rupee / currency badge (bottom-right spark) -->
  <circle cx="63" cy="63" r="11" fill="#0f172a" opacity="0.85"/>
  <circle cx="63" cy="63" r="10" fill="url(#accentGrad)" filter="url(#glow)"/>
  <text x="63" y="68" text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-weight="800" font-size="12"
        fill="#0a0e27">₹</text>
</svg>
