<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" role="img" aria-label="Spendly logo full">
  <defs>
    <linearGradient id="gradFull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="accentG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Icon left (bolder wallet + AI motif) -->
  <g id="icon" transform="translate(16,16)">
    <rect x="0" y="0" width="224" height="224" rx="40" fill="url(#gradFull)" opacity="0.16"/>

    <g transform="translate(34,34)">
      <rect x="0" y="40" width="168" height="104" rx="22" fill="#07112a" />
      <rect x="0" y="10" width="116" height="60" rx="14" fill="url(#gradFull)" />

      <g transform="translate(24,56)" fill="none" stroke="#dfe8ff" stroke-width="8" stroke-linecap="round">
        <path d="M12 0v36"/>
        <path d="M44 10v32"/>
        <path d="M76 0v36"/>
        <path d="M12 18h72" opacity="0.7"/>
        <circle cx="12" cy="0" r="6" fill="#ffffff" stroke="none"/>
      </g>

      <g transform="translate(150,132)">
        <circle r="22" fill="url(#accentG)"/>
        <text x="0" y="8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="20" fill="#021025">₹</text>
      </g>
    </g>
  </g>

  <!-- Wordmark (bolder) -->
  <g transform="translate(280,136)">
    <text x="0" y="6" font-family="Poppins, Inter, Arial, sans-serif" font-size="56" font-weight="900" fill="url(#gradFull)" letter-spacing="-1">Spendly</text>
  </g>
</svg>