<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>
  <!-- Shine -->
  <rect x="4" y="4" width="56" height="28" rx="14" fill="white" opacity="0.12"/>
  <!-- Chart bars -->
  <rect x="10" y="40" width="6" height="12" rx="2" fill="white" opacity="0.70"/>
  <rect x="20" y="32" width="6" height="20" rx="2" fill="white" opacity="0.90"/>
  <rect x="30" y="35" width="6" height="17" rx="2" fill="white" opacity="0.80"/>
  <rect x="40" y="26" width="6" height="26" rx="2" fill="white"/>
  <!-- Trend line -->
  <polyline points="13,38 23,30 33,33 43,24"
    stroke="url(#acc)" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <!-- Trend dot -->
  <circle cx="43" cy="24" r="4" fill="url(#acc)"/>
</svg>
